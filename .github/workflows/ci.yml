# Continuous integration — fast test suite on every push / PR.
#
# We intentionally exclude pytest "slow" tests (multi-minute GA / NSGA-II gate
# runs). Those are thesis validation experiments, not per-commit CI.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fast tests
        run: |
          python -m pytest -m "not slow" -q
